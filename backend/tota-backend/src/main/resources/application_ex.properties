spring.application.name=tota-backend

spring.ai.openai.api-key=""

# Change the base URL to point to OpenRouter
spring.ai.openai.base-url= https://openrouter.ai/api/v1/chat/completions
spring.devtools.restart.enabled=false
# Default model to use (you can still override in code)
#spring.ai.openai.chat.model=mistralai/mistral-small-3.2-24b-instruct

# Default chat model config (used by OpenAiChatClient)
spring.ai.openai.chat.options.model=mistralai/mistral-small-3.2-24b-instruct
spring.ai.openai.chat.options.temperature=0.4
#logging.level.org.mongodb.driver=DEBUG
logging.level.org.mongodb.driver=INFO
spring.ai.retry.max-attempts=1

spring.data.mongodb.uri=mongodb+srv://<user>:Mongoroot@<document>/<proj_name>?retryWrites=true&w=majority&appName=Clusterfree
spring.data.mongodb.database=proj-aibot
#&appName=Clusterfree